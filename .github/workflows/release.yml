name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-binaries:
    name: build-binaries (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-13
          - rid: osx-arm64
            os: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Publish UI
        run: >
          dotnet publish src/FlashSkink.UI.Avalonia
          -c Release
          --self-contained
          -r ${{ matrix.rid }}
          -p:PublishSingleFile=true
          -o publish/ui

      - name: Publish CLI
        run: >
          dotnet publish src/FlashSkink.CLI
          -c Release
          --self-contained
          -r ${{ matrix.rid }}
          -p:PublishSingleFile=true
          -o publish/cli

      - name: Archive
        run: >
          cd publish &&
          zip -r ../FlashSkink-${{ github.ref_name }}-${{ matrix.rid }}.zip . ||
          Compress-Archive -Path . -DestinationPath ../FlashSkink-${{ github.ref_name }}-${{ matrix.rid }}.zip
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FlashSkink-${{ github.ref_name }}-${{ matrix.rid }}
          path: FlashSkink-${{ github.ref_name }}-${{ matrix.rid }}.zip

  generate-changelog:
    name: generate-changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true

  create-release:
    name: create-release
    runs-on: ubuntu-latest
    needs: [build-binaries, generate-changelog]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: artifacts/**/*.zip
