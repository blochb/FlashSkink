name: PR Review — Recovery/WAL

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths:
      - 'src/FlashSkink.Core/Metadata/Migrations/**'
      - 'src/FlashSkink.Core/Metadata/WalRepository.cs'
      - 'src/FlashSkink.Core/Healing/**'
      - 'src/FlashSkink.Core/Usb/**'
      - 'src/FlashSkink.Core/Orchestration/**'

jobs:
  recovery-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 25
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(cat:*),Bash(ls:*),Bash(grep:*)"
          prompt: |
            You are performing a focused recovery and WAL consistency review of this pull request.
            You have a strict turn budget. Be ruthlessly efficient.

            ## Procedure

            1. Get changed files: `git diff --name-only origin/${{ github.base_ref }}...HEAD`
            2. Read the full diff: `git diff origin/${{ github.base_ref }}...HEAD`
            3. Identify recovery-critical operations in the diff (WAL writes, fsync calls, transaction boundaries, compensation/rollback paths).
            4. For files containing recovery-critical operations, read them ONCE to check all 5 categories.
            5. Post ONE review comment covering the categories below. Then STOP.

            ## Critical efficiency rules

            - Do NOT read reference docs (BLUEPRINT.md, CLAUDE.md) — the categories below already encode the requirements.
            - Do NOT read files that don't touch WAL, transactions, or recovery paths.
            - Do NOT re-read files. One pass per file maximum.
            - If you reach turn 15 without starting the review, STOP and write what you have.

            ## Categories to check (cover every one — say "clean" explicitly if no issue found)

            - **Idempotent recovery steps**: can each WAL recovery step be run twice safely? Any non-idempotent op in a recovery path?
            - **fsync sequencing**: is write → fsync → rename → fsync-directory followed exactly per principle 29?
            - **Transaction boundaries**: are SQLite transactions scoped so a crash leaves the brain consistent?
            - **CancellationToken.None literal** (principle 17): in all compensation/recovery paths, does every await spell out `CancellationToken.None` literally (not via a local variable)?
            - **Crash-consistency invariant** (principle 30): can a crash leave an orphaned blob row without a file row, or a file row with a missing blob?

            ## Hard rules

            - Do NOT do general code review — recovery/WAL only.
            - After the review is posted, you are done.
