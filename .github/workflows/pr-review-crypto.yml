name: PR Review — Crypto

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths:
      - 'src/FlashSkink.Core/Crypto/**'
      - 'src/FlashSkink.Core/Engine/WritePipeline.cs'
      - 'src/FlashSkink.Core/Engine/ReadPipeline.cs'
      - 'src/FlashSkink.Core.Abstractions/Models/*.cs'

jobs:
  crypto-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 25
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(cat:*),Bash(ls:*),Bash(grep:*)"
          prompt: |
            You are performing a focused cryptographic security review of this pull request.
            You have a strict turn budget. Be ruthlessly efficient.

            ## Procedure

            1. Get changed files: `git diff --name-only origin/${{ github.base_ref }}...HEAD`
            2. Read the full diff: `git diff origin/${{ github.base_ref }}...HEAD`
            3. Identify crypto-critical operations in the diff (encryption/decryption calls, key derivation, key disposal, nonce generation, AAD construction).
            4. For files containing crypto-critical operations, read them ONCE to check all 8 categories.
            5. Post ONE review comment covering the categories below. Then STOP.

            ## Critical efficiency rules

            - Do NOT read reference docs (BLUEPRINT.md, CLAUDE.md) — the categories below already encode the requirements.
            - Do NOT read files that don't contain crypto primitives (tests, models, interfaces).
            - Do NOT re-read files. One pass per file maximum.
            - If you reach turn 15 without starting the review, STOP and write what you have.

            ## Categories to check (cover every one — say "clean" explicitly if no issue found)

            - **Nonce reuse**: is each AES-GCM nonce unique per encryption? Generated freshly per operation?
            - **AAD correctness**: is the AAD correct and consistent between encrypt and decrypt?
            - **Key zeroization**: are DEK, KEK, and derived keys zeroed on ALL failure paths including exception unwind?
            - **Timing side channels**: any branch on secret data, string comparison of keys/tags?
            - **Accidental secret logging**: any log calls that could capture key material, plaintext, or tokens?
            - **stackalloc across await**: any stackalloc'd spans used after an await boundary?
            - **AES-GCM tag handling**: is the auth tag verified before plaintext is returned to the caller?
            - **HKDF context strings**: are info strings unique per derived key purpose?

            ## Hard rules

            - Do NOT do general code review — crypto only.
            - After the review is posted, you are done.
