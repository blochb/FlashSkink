name: PR Review — Crypto

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths:
      - 'src/FlashSkink.Core/Crypto/**'
      - 'src/FlashSkink.Core/Engine/WritePipeline.cs'
      - 'src/FlashSkink.Core/Engine/ReadPipeline.cs'
      - 'src/FlashSkink.Core.Abstractions/Models/*.cs'

jobs:
  crypto-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pre-compute ALL inputs into a single context file so Claude has
      # nothing to explore — it reads one file and posts the comment.
      - name: Build review context
        shell: bash
        run: |
          BASE_REF="${{ github.base_ref }}"
          mkdir -p /tmp/review

          {
            echo "# Crypto Review Context"
            echo ""

            echo "## Changed files"
            echo '```'
            git diff --name-only "origin/$BASE_REF...HEAD"
            echo '```'
            echo ""

            echo "## Full diff"
            echo '```diff'
            git diff "origin/$BASE_REF...HEAD" | head -c 200000
            echo '```'
          } > /tmp/review/context.md

          echo "Context built: $(wc -l < /tmp/review/context.md) lines, $(wc -c < /tmp/review/context.md) bytes"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 15
            --allowed-tools "Read"
          prompt: |
            All inputs you need are in /tmp/review/context.md
            Read it ONCE. Post the review comment below. Then STOP.

            Do NOT read any other files. Do NOT run any commands. Do NOT explore the repo.
            If something is unclear from the context file, say so in the comment rather than looking for it.

            ## Review comment format

            Cover every category — write "clean" explicitly if no issue found.

            - **Nonce reuse**: is each AES-GCM nonce unique per encryption? Generated freshly per operation?
            - **AAD correctness**: is the AAD correct and consistent between encrypt and decrypt?
            - **Key zeroization**: are DEK, KEK, and derived keys zeroed on ALL failure paths including exception unwind?
            - **Timing side channels**: any branch on secret data, string comparison of keys/tags?
            - **Accidental secret logging**: any log calls that could capture key material, plaintext, or tokens?
            - **stackalloc across await**: any stackalloc'd spans used after an await boundary?
            - **AES-GCM tag handling**: is the auth tag verified before plaintext is returned to the caller?
            - **HKDF context strings**: are info strings unique per derived key purpose?

            After posting, you are done.
