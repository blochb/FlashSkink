name: PR Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: "true"
          claude_args: --model claude-opus-4-7 --max-turns 20
          prompt: |
            Review this pull request for code quality issues.

            Focus on: logic bugs, missing test coverage, unclear naming, edge cases not handled, error-handling gaps, resource leaks, async/await pitfalls, and cancellation token misuse.

            Do NOT repeat findings from the principle-audit job (principle violations, plan compliance, scope creep) — those are handled separately.

            Post one summary comment describing the overall assessment, plus inline comments on specific lines where you find issues. Be concise and actionable.
