name: PR Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          mkdir -p ~/.local/bin
          ln -sf "$(npm config get prefix)/bin/claude" ~/.local/bin/claude

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: "true"
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 20
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(cat:*),Bash(ls:*)"
          prompt: |
            You are performing a focused code-quality review on this pull request.
            Be efficient — stop as soon as your review is posted.

            ## Procedure

            1. Get changed files: `git diff --name-only origin/${{ github.base_ref }}...HEAD`
            2. Read the full diff: `git diff origin/${{ github.base_ref }}...HEAD`
            3. Only read full file contents when the diff alone doesn't give enough context to evaluate a specific issue.
            4. Post ONE summary review comment plus inline comments on specific lines where you find concrete issues. Then STOP.

            ## Focus areas (only these)

            Logic bugs, missing test coverage, unclear naming, edge cases not handled, error-handling gaps, resource leaks, async/await pitfalls, cancellation token misuse.

            ## Hard rules

            - Do NOT repeat findings from the principle-audit job (principle violations, plan compliance, scope creep) — those are handled separately.
            - Do NOT comment on style/formatting (dotnet-format handles it).
            - Do NOT explore the repository beyond what the diff requires.
            - Inline comments must reference an actual concrete issue with a fix suggestion. No vague "consider X" comments.
            - After the review is posted, you are done. Do not take further actions.
