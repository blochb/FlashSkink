name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger trx --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        continue-on-error: true

  assembly-layering:
    name: assembly-layering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run architecture tests
        run: dotnet test --no-build -c Release --filter "FullyQualifiedName~ArchitectureTests"

  plan-check:
    name: plan-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      plan_file: ${{ steps.compute.outputs.plan_file }}
      has_plan: ${{ steps.compute.outputs.has_plan }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute plan file path
        id: compute
        shell: bash
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"

          if [[ "$BRANCH" =~ ^pr/([0-9]+\.[0-9]+)- ]]; then
            SECTION="${BASH_REMATCH[1]}"
            PLAN_FILE=".claude/plans/pr-${SECTION}.md"
            echo "plan_file=$PLAN_FILE" >> "$GITHUB_OUTPUT"
            echo "Expecting plan file: $PLAN_FILE"
          else
            echo "plan_file=" >> "$GITHUB_OUTPUT"
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
            echo "Not a pr/ branch — skipping plan check."
            exit 0
          fi

          if [[ ! -f "$PLAN_FILE" ]]; then
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
            echo "::error::Plan file '$PLAN_FILE' not found for branch '$BRANCH'"
            exit 1
          fi

          REQUIRED_HEADINGS=(
            "## Scope"
            "## Files to create"
            "## Files to modify"
            "## Public API surface"
            "## Principles touched"
            "## Test spec"
            "## Acceptance criteria"
            "## Line-of-code budget"
            "## Non-goals"
          )

          MISSING=0
          for HEADING in "${REQUIRED_HEADINGS[@]}"; do
            if ! grep -qF "$HEADING" "$PLAN_FILE"; then
              echo "::error::Plan file missing required heading: $HEADING"
              MISSING=1
            fi
          done

          if ! grep -q '§' "$PLAN_FILE"; then
            echo "::error::Plan file must contain at least one blueprint section reference (§)"
            MISSING=1
          fi

          if [[ $MISSING -ne 0 ]]; then
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "has_plan=true" >> "$GITHUB_OUTPUT"
          echo "Plan file OK."

  changes:
    name: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source:
              - 'src/**'
              - 'tests/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'

  principle-audit:
    name: principle-audit
    needs: [changes, plan-check]
    runs-on: ubuntu-latest
    # Only run when source actually changed AND a valid plan file exists.
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.source == 'true' &&
      needs.plan-check.outputs.has_plan == 'true'
    continue-on-error: true
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pre-compute ALL inputs Claude needs into a single context file.
      # This avoids burning turns on file exploration — Claude reads one file
      # and posts the comment.
      - name: Build audit context
        shell: bash
        run: |
          PLAN_FILE="${{ needs.plan-check.outputs.plan_file }}"
          BASE_REF="${{ github.base_ref }}"

          mkdir -p /tmp/audit
          OUT=/tmp/audit/context.md

          {
            echo "# Principle Audit Context"
            echo ""
            echo "Plan file path: \`$PLAN_FILE\`"
            echo "Base branch: \`$BASE_REF\`"
            echo ""

            echo "## Changed files"
            echo '```'
            git diff --name-only "origin/$BASE_REF...HEAD"
            echo '```'
            echo ""

            echo "## Diff (.cs / .csproj / .props only)"
            echo '```diff'
            git diff "origin/$BASE_REF...HEAD" -- '*.cs' '*.csproj' '*.props' \
              | head -c 200000
            echo '```'
            echo ""

            echo "## Principles section (from CLAUDE.md)"
            echo '```markdown'
            awk '/^## Principles/{flag=1; next} /^## [A-Z]/{flag=0} flag' CLAUDE.md
            echo '```'
            echo ""

            echo "## Plan file contents"
            echo '```markdown'
            cat "$PLAN_FILE"
            echo '```'
          } > "$OUT"

          echo "Context built: $(wc -l < "$OUT") lines, $(wc -c < "$OUT") bytes"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Sonnet is plenty for this constrained task — no exploration needed.
          # Tools restricted to Read (the context file) + the comment-posting
          # tools the action provides. No Bash, no Grep — nothing to loop on.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 15
            --allowed-tools "Read"
          prompt: |
            All inputs you need are in this single file: /tmp/audit/context.md
            Read it ONCE. Then post the comment described below. Then STOP.

            Do not read any other files. Do not run any commands. Do not explore.
            If something is unclear from the context file, say so in the comment
            rather than going to look for it.

            ## Comment format (post exactly this structure)

            **1. Principle violations** — for each violation in the diff, list as:
            `path/file.cs:LINE — Principle N: short reason`
            If none, write "None found."

            **2. Plan-template compliance issues** — list any missing or malformed
            sections in the plan file (compared to the principle list).
            If none, write "None found."

            **3. Scope creep** — files in the "Changed files" list that are NOT
            listed in the plan's "## Files to create" or "## Files to modify"
            sections. If none, write "None found."

            After posting, you are done.

  conventional-commits:
    name: conventional-commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            chore
            refactor
            perf
            ci

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build for CodeQL
        run: dotnet build -c Release

      - uses: github/codeql-action/analyze@v3

  dotnet-format:
    name: dotnet-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn
